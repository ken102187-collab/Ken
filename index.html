<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>資產管理 Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input, select { outline: none; transition: all 0.2s; }
        input:focus { ring: 2px; ring-color: #3b82f6; }
    </style>
</head>
<body class="text-slate-900">

    <div id="app" class="min-h-screen pb-32">
        <!-- 頂部導航 -->
        <header class="glass border-b border-slate-100 px-6 py-4 sticky top-0 z-30">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <h1 class="text-xl font-black text-slate-800">資產管理 Pro</h1>
                <button id="open-modal-btn" class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition-transform">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-6">
            <!-- 總額卡片 -->
            <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden mb-8">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">資產淨值估算 (TWD)</p>
                <h2 id="total-amount" class="text-4xl font-black tracking-tighter">$0</h2>
                <div class="absolute top-[-20%] right-[-10%] w-48 h-48 bg-blue-500/20 rounded-full blur-[60px]"></div>
            </div>

            <!-- 分類標題 -->
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 id="list-title" class="font-black text-slate-800">所有資產</h3>
                <span id="asset-count" class="text-[10px] bg-slate-100 text-slate-400 px-3 py-1 rounded-full font-bold">0 ITEMS</span>
            </div>

            <!-- 資產列表容器 -->
            <div id="asset-list" class="space-y-4">
                <!-- 動態載入 -->
                <div class="text-center py-20 text-slate-300">
                    <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2 opacity-20"></i>
                    <p class="text-sm font-bold">尚無資產資料</p>
                </div>
            </div>
        </main>

        <!-- 底部導航 -->
        <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-100 p-4 pb-8 safe-bottom flex justify-around z-40">
            <button data-tab="all" class="nav-item flex flex-col items-center gap-1 text-blue-600 font-bold">
                <i data-lucide="layout-grid"></i><span class="text-[10px]">全部</span>
            </button>
            <button data-tab="bank" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="landmark"></i><span class="text-[10px]">銀行</span>
            </button>
            <button data-tab="stock" class="nav-item flex flex-col items-center gap-1 text-slate-300">
                <i data-lucide="trending-up"></i><span class="text-[10px]">證券</span>
            </button>
        </nav>
    </div>

    <!-- 新增資產 Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-0 sm:p-6">
        <div class="w-full max-w-sm bg-white rounded-t-[2.5rem] sm:rounded-[3rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800">新增資產</h3>
                <button id="close-modal-btn" class="text-slate-300 hover:text-slate-500"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2 mb-1 block">資產種類</label>
                    <select id="asset-type" class="w-full bg-slate-50 p-4 rounded-2xl font-bold border-2 border-transparent focus:border-blue-500 outline-none">
                        <option value="bank">銀行帳戶 (TWD)</option>
                        <option value="tw_stock">台股 (TWD)</option>
                        <option value="us_stock">美股 (USD)</option>
                        <option value="crypto">加密貨幣 (USD)</option>
                    </select>
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-2 mb-1 block">項目名稱</label>
                    <input id="asset-name" placeholder="例如：中國信託 / 台積電" class="w-full bg-slate-50 p-4 rounded-2xl font-bold">
                </div>

                <!-- 只有證券才顯示的欄位 -->
                <div id="symbol-wrapper">
                    <label class="text-[10px] font-black text-slate-400 ml-2 mb-1 block">標的代號</label>
                    <input id="asset-symbol" placeholder="例如：2330.TW / AAPL" class="w-full bg-slate-50 p-4 rounded-2xl font-bold uppercase">
                </div>

                <div>
                    <label id="value-label" class="text-[10px] font-black text-slate-400 ml-2 mb-1 block">帳戶餘額 (TWD)</label>
                    <input id="asset-value" type="number" inputmode="decimal" placeholder="0" class="w-full bg-slate-50 p-4 rounded-2xl font-bold">
                </div>
                
                <button id="save-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-200 mt-4 active:scale-95 transition-all">
                    儲存資產
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 初始化安全檢查 ---
        let db, auth, user;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-asset-app';
        let assets = [];
        let currentTab = 'all';

        async function initFirebase() {
            try {
                if (typeof __firebase_config === 'undefined') throw new Error("No Config");
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        startDataSync();
                    }
                });
            } catch (e) {
                console.warn("Firebase 初始化跳過，進入本地模式:", e.message);
                // 這裡可以加入 localStorage 備份方案
            }
        }

        // --- 核心邏輯 ---
        function startDataSync() {
            if (!db || !user) return;
            const path = collection(db, 'artifacts', appId, 'users', user.uid, 'assets');
            onSnapshot(path, (snap) => {
                assets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Firestore Error:", err));
        }

        function render() {
            const list = document.getElementById('asset-list');
            const filtered = assets.filter(a => {
                if (currentTab === 'all') return true;
                if (currentTab === 'bank') return a.type === 'bank';
                if (currentTab === 'stock') return a.type !== 'bank';
                return true;
            });

            document.getElementById('asset-count').innerText = `${filtered.length} ITEMS`;
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 text-slate-300">
                        <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2 opacity-20"></i>
                        <p class="text-sm font-bold">尚無資料</p>
                    </div>`;
            } else {
                list.innerHTML = '';
                let total = 0;
                filtered.forEach(a => {
                    const amount = a.type === 'bank' ? a.balance : (a.quantity * (a.lastPrice || 0));
                    total += amount;
                    
                    const div = document.createElement('div');
                    div.className = "bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm";
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-blue-600">
                                <i data-lucide="${a.type === 'bank' ? 'landmark' : 'trending-up'}" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h4 class="font-black text-slate-800">${a.name}</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase">${a.type === 'bank' ? 'CASH' : a.symbol}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-slate-900">$${Math.round(amount).toLocaleString()}</div>
                            <button onclick="window.removeAsset('${a.id}')" class="text-slate-200 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-3 h-3"></i>
                            </button>
                        </div>
                    `;
                    list.appendChild(div);
                });
                document.getElementById('total-amount').innerText = `$${Math.round(total).toLocaleString()}`;
            }
            if (window.lucide) lucide.createIcons();
        }

        // --- 互動邏輯 ---
        const typeSelect = document.getElementById('asset-type');
        const symbolWrapper = document.getElementById('symbol-wrapper');
        const valueLabel = document.getElementById('value-label');
        const valueInput = document.getElementById('asset-value');

        typeSelect.addEventListener('change', () => {
            const type = typeSelect.value;
            if (type === 'bank') {
                symbolWrapper.style.display = 'none';
                valueLabel.innerText = "帳戶餘額 (TWD)";
                valueInput.placeholder = "請輸入目前餘額";
            } else {
                symbolWrapper.style.display = 'block';
                valueLabel.innerText = "持有數量";
                valueInput.placeholder = "例如：1000";
            }
        });

        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('asset-name').value;
            const type = typeSelect.value;
            const val = parseFloat(valueInput.value || 0);
            const symbol = document.getElementById('asset-symbol').value;

            if (!name) return;

            if (db && user) {
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'assets'), {
                    name, type,
                    symbol: type === 'bank' ? '' : symbol,
                    balance: type === 'bank' ? val : 0,
                    quantity: type === 'bank' ? 0 : val,
                    lastPrice: 0,
                    createdAt: serverTimestamp()
                });
            }
            toggleModal(false);
        };

        window.removeAsset = async (id) => {
            if (confirm("確定刪除？") && db && user) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'assets', id));
            }
        };

        function toggleModal(show) {
            document.getElementById('add-modal').classList.toggle('hidden', !show);
            if (show) typeSelect.dispatchEvent(new Event('change'));
        }

        document.getElementById('open-modal-btn').onclick = () => toggleModal(true);
        document.getElementById('close-modal-btn').onclick = () => toggleModal(false);

        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.onclick = () => {
                currentTab = btn.dataset.tab;
                document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-blue-600', 'text-slate-300'));
                btn.classList.replace('text-slate-300', 'text-blue-600');
                render();
            };
        });

        // 啟動
        initFirebase();
        render(); // 先執行一次渲染(本地資料)
    </script>
</body>
</html>
